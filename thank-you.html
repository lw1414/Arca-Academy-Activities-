<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Thank you — Tester.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --ink:#f6f1e6; --hair:rgba(246,241,230,0.06);
    --gold-1:#C6A559; --gold-2:#E6B979;
    --gold-gradient:linear-gradient(135deg,#E6B979 0%,#C6A559 100%);
    --serif:'Fraunces','Times New Roman',serif;
    --sans:'Montserrat',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:80px 24px;text-align:center;position:relative;overflow:hidden;
    background:
      radial-gradient(900px 700px at 50% 30%, rgba(198,165,89,0.13), transparent 60%),
      radial-gradient(700px 500px at 50% 90%, rgba(230,185,121,0.06), transparent 70%),
      #000;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:100;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .eyebrow{
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold-2);
    margin-bottom:32px;display:inline-flex;align-items:center;gap:14px;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:32px;height:1px;background:var(--gold-2);opacity:.6}
  .check{
    width:88px;height:88px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold-2),var(--gold-1));
    display:flex;align-items:center;justify-content:center;margin:0 auto 36px;
    box-shadow:0 0 60px rgba(230,185,121,0.45),inset 0 1px 0 rgba(255,255,255,0.45);
    animation:pop .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .check svg{width:42px;height:42px;color:#0c0700}
  h1{
    font-family:var(--serif);font-weight:300;font-size:clamp(48px,7vw,92px);
    letter-spacing:-0.035em;line-height:1;margin:0 0 22px;max-width:14ch;
  }
  h1 em{font-style:italic;background:var(--gold-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  p.lede{
    font-size:15.5px;line-height:1.75;color:#b8b2a4;max-width:46ch;margin:0 auto 44px;font-weight:300;
  }
  .back{
    font-family:var(--sans);font-size:11px;letter-spacing:0.26em;text-transform:uppercase;font-weight:500;
    color:#0c0700;background:linear-gradient(135deg,var(--gold-2),var(--gold-1));
    padding:14px 28px;border-radius:999px;text-decoration:none;
    display:inline-flex;align-items:center;gap:10px;
    box-shadow:0 14px 38px -12px rgba(230,185,121,0.55),inset 0 1px 0 rgba(255,255,255,0.4);
    transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s ease;
  }
  .back:hover{transform:translateY(-1px);box-shadow:0 20px 48px -12px rgba(230,185,121,0.75)}
  .back .arr{transition:transform .3s cubic-bezier(.2,.8,.2,1)}
  .back:hover .arr{transform:translateX(-4px)}
  .meta{
    margin-top:64px;font-family:var(--mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:#5a5a5a;
    display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
  }
  .meta i{font-style:normal;color:#3a3a3a}
</style>
</head>
<body>
  <div class="eyebrow">Message received</div>
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12.5l4.5 4.5L19 7"/>
    </svg>
  </div>
  <h1>Thanks — we'll be <em>in touch.</em></h1>
  <p class="lede">Your message is queued with our team. Expect a reply from a real engineer within one business day. If it's urgent, mention it in the subject line and we'll triage faster.</p>
  <a class="back" href="/">
    <span class="arr">←</span>
    <span>Back to home</span>
  </a>
  <div class="meta">
    <span>Tester.io</span><i>·</i>
    <span>QA, automated</span><i>·</i>
    <span>Reply within 24h</span>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unsubscribed — Tester.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Montserrat:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;--ink:#f6f1e6;--gold-1:#C6A559;--gold-2:#E6B979;
    --gold-gradient:linear-gradient(135deg,#E6B979,#C6A559);
    --serif:'Fraunces','Times New Roman',serif;
    --sans:'Montserrat',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --hair:rgba(246,241,230,0.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px 24px;text-align:center;position:relative;overflow:hidden;
    background:
      radial-gradient(900px 700px at 50% 28%, rgba(120,100,60,0.10), transparent 60%),
      radial-gradient(700px 500px at 50% 92%, rgba(80,80,80,0.04), transparent 70%),
      #000;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  body::after{
    content:"";position:fixed;left:0;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(230,185,121,0.20),transparent);z-index:1;
  }
  .card{position:relative;z-index:2;max-width:560px}
  .brand{
    font-family:var(--serif);font-style:italic;font-weight:500;font-size:22px;letter-spacing:-0.02em;
    color:var(--ink);margin-bottom:48px;display:inline-flex;align-items:center;gap:8px;
  }
  .brand .tld{
    background:var(--gold-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 8px rgba(230,185,121,0.55));
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:14px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.4em;text-transform:uppercase;color:#9a9388;
    margin-bottom:32px;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:32px;height:1px;background:#9a9388;opacity:.4}
  .badge{
    width:96px;height:96px;border-radius:50%;
    background:linear-gradient(135deg,#3a3a3a,#1a1a1a);
    border:1px solid rgba(246,241,230,0.12);
    display:inline-flex;align-items:center;justify-content:center;margin:0 auto 36px;position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
    animation:pop .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .badge svg{width:36px;height:36px;color:#9a9388;z-index:2}
  h1{font-family:var(--serif);font-weight:300;font-size:clamp(40px,7vw,72px);letter-spacing:-0.03em;line-height:1;margin:0 0 22px}
  h1 em{font-style:italic;color:#9a9388}
  p.lede{font-size:15.5px;line-height:1.75;color:#9a9388;max-width:46ch;margin:0 auto 44px;font-weight:300}
  .btn{
    font-family:var(--sans);font-size:11px;letter-spacing:0.26em;text-transform:uppercase;font-weight:500;
    padding:14px 28px;border-radius:999px;text-decoration:none;
    display:inline-flex;align-items:center;gap:10px;
    color:var(--gold-2);background:transparent;border:1px solid rgba(230,185,121,0.45);
    transition:all .25s cubic-bezier(.2,.8,.2,1);
    margin-bottom:60px;
  }
  .btn:hover{background:rgba(230,185,121,0.08);border-color:var(--gold-2);transform:translateY(-1px)}
  .btn .arr{transition:transform .3s cubic-bezier(.2,.8,.2,1)}
  .btn:hover .arr{transform:translateX(4px)}
  .meta{
    font-family:var(--mono);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:#5a5a5a;
    display:inline-flex;gap:18px;align-items:center;
  }
  .meta i{font-style:normal;color:#3a3a3a}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Tester<span class="tld">.io</span></div>
    <div class="eyebrow">Goodbye for now</div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
    <h1>You're <em>unsubscribed.</em></h1>
    <p class="lede">No more follow-ups or Field Notes from us. You won't hear from Tester.io again unless you reach out first. Changed your mind? You can always send a new message from the contact form.</p>
    <a class="btn" href="/"><span>Back to Tester.io</span><span class="arr">→</span></a>
    <div class="meta">
      <span>Confirmed</span><i>·</i>
      <span>Tester.io</span><i>·</i>
      <span>QA, automated</span>
    </div>
  </div>
</body>
</html>
